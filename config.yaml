# Competitor monitoring configuration
# ── To add/remove a site: edit the `sites:` list below. brand_source controls
#    how the brand is detected: vendor | tags | title
# ── To adjust hero models: edit `hero_models:` (keywords are case-insensitive
#    regexes matched against the normalized title)

timezone: Asia/Manila
currency: PHP
max_valid_price: 50000000   # prices at/above this are placeholders ("DM for price") — excluded from value metrics

sites:
  - key: pursemaison
    name: Purse Maison
    base_url: https://www.pursemaison.com
    is_mine: true
    brand_source: vendor
  - key: orangebox
    name: The Orange Box
    base_url: https://theorangebox.ph
    is_mine: false
    brand_source: title
  - key: baghub
    name: The Bag Hub
    base_url: https://www.thebaghub.com
    is_mine: false
    brand_source: tags
  - key: shopwithk
    name: Shop with K
    base_url: https://shopwithk.ph
    is_mine: false
    brand_source: title
  - key: luxurywish
    name: Luxury Wish
    base_url: https://luxurywish.com.ph
    is_mine: false
    brand_source: vendor
  - key: aandjluxury
    name: A&J Luxury
    base_url: https://aandjluxury.com
    is_mine: false
    brand_source: vendor   # vendor field holds the real brand (tags empty)
  - key: missmanilaluxe
    name: Miss Manila Luxe
    base_url: https://www.missmanilaluxe.com
    is_mine: false
    brand_source: title    # vendor = store name, tags = SKU codes; brand is in the title
  - key: canonebags
    name: Canone Bags Prime
    base_url: https://canonebagsprime.com
    is_mine: false
    brand_source: vendor   # vendor field holds the real brand (Gucci, Dior, YSL…)
  - key: kcluxurybags
    name: KC Luxury Bags
    base_url: https://kcluxurybags.com
    is_mine: false
    platform: woocommerce  # not Shopify — read via the WooCommerce Store API
    brand_source: title    # no vendor field; brand is parsed from the product title
  - key: mommymicah
    name: Mommy Micah
    base_url: https://mommymicah.com
    is_mine: false
    platform: woocommerce  # WooCommerce Store API (clean titles/prices)
    brand_source: title    # brand parsed from the title (brands taxonomy is inconsistent)

scrape:
  page_limit: 250
  max_pages: 60
  delay_seconds: 1.5
  timeout_seconds: 30
  retries: 3
  user_agent: "MarketIntelBot/1.0 (+rbbincal@gmail.com; polite daily snapshot)"
  respect_robots: true
  image_hash: true          # perceptual-hash first image of newly seen products
  image_hash_width: 128
  image_hash_budget_seconds: 480   # cap photo-fingerprinting per run (protects against
                                   # job timeout when first adding a large store)

sold_detection:
  missing_days_threshold: 3   # gone this many calendar days => sold (run frequency-independent)

aging_thresholds: [60, 90]

# Items to drop from ALL sold metrics (counts, value, feed, benchmark, trend) and
# from live inventory. Keyed by site; each entry is a case/punctuation-insensitive
# title substring. Add or remove items here as needed.
sold_exclusions:
  orangebox:
    - "Rolex Daydate Computer Dial Diamonds YG President 36MM 2008"
    - "Rolex Daytona Champagne Dial YG/Steel Oyster Bracelet 40MM 2017"
    - "Audemars Piguet RO Offshore Chronograph RG Rubber Strap 44MM 2016"
    - "Rolex Yachtmaster Blue Dial YG/Steel Oyster Bracelet 35MM 1999"
    - "Rolex Daydate Computer Dial Diamonds RG Oyster 36MM"
    - "Cartier Panthere Large All Steel. 4575227883FY"
    - "Cartier Tank White Dial Roman YG/Steel 32mm"
    - "Cartier Santos Galbee White Dial Roman All Steel 29MM"
    - "Preowned. Chanel Ring"
    - "Hermes Birkin 25 Sellier Black Epsom GHW. UHT494ID"
    - "Rolex Lefty GMT Master II Green Ceramic Dial FullWhitegold 40MM 2026"
    - "Rolex Day-Date MOP Dial President Rosegold 40MM 2026"
    - "Rolex Day-Date 40 Eisenkiesel Diamond Set Dial President Rosegold 40MM 2026"

hero_models:
  - name: Birkin 25
    brand: Hermes
    keywords: ['birkin\s*25\b', '\bb25\b', 'birkin25']
  - name: Birkin 30
    brand: Hermes
    keywords: ['birkin\s*30\b', '\bb30\b', 'birkin30']
  - name: Kelly 25
    brand: Hermes
    keywords: ['kelly\s*25\b', '\bk25\b', 'kelly25']
  - name: Kelly 28
    brand: Hermes
    keywords: ['kelly\s*28\b', '\bk28\b', 'kelly28']
  - name: Mini Kelly (Kelly 20)
    brand: Hermes
    keywords: ['mini\s*kelly', 'kelly\s*20\b', '\bk20\b', 'kelly\s*ii', 'kelly20']
  - name: Constance 18
    brand: Hermes
    keywords: ['constance\s*18\b', '\bc18\b', 'constance18', 'mini\s*constance']
  - name: Constance 24
    brand: Hermes
    keywords: ['constance\s*24\b', '\bc24\b', 'constance24']
  # Chanel "Classic Double Flap". Stores write the three words (classic / double /
  # flap) and the size in EVERY possible order, e.g.:
  #   "Classic Double Flap Medium ..."        (Purse Maison)
  #   "Medium Double Flap ..."                (Orange Box)
  #   "... Medium Classic Double Flap Bag"    (The Bag Hub)
  #   "Chanel Classic Medium Flap ..."        (Shop with K — size BETWEEN classic & flap)
  #   "Chanel Classic Small Flap ..."         (Shop with K)
  #   "Chanel Classic Jumbo Flap ..."         (Shop with K)
  # Adjacency-based regexes can't catch all of these, so each size uses
  # presence lookaheads: the title must contain "flap" AND ("classic" OR
  # "double") AND the size word, in any arrangement. This excludes non-classic
  # flaps that lack both "classic" and "double" — "Easy Flap", "Mini/Rectangular
  # Flap", "Reissue", "Pearl Handle ... Flap".
  - name: Chanel Double Flap Small
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\bsmall\b)']
  - name: Chanel Double Flap Medium
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\b(?:medium|m l)\b)']
  - name: Chanel Double Flap Jumbo
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\bjumbo\b)', '\bjumbo\b']

# Competitor monitoring configuration
# ── To add/remove a site: edit the `sites:` list below. brand_source controls
#    how the brand is detected: vendor | tags | title
# ── To adjust hero models: edit `hero_models:` (keywords are case-insensitive
#    regexes matched against the normalized title)

timezone: Asia/Manila
currency: PHP
max_valid_price: 50000000   # prices at/above this are placeholders ("DM for price") — excluded from value metrics

sites:
  - key: pursemaison
    name: Purse Maison
    base_url: https://www.pursemaison.com
    is_mine: true
    brand_source: vendor
  - key: orangebox
    name: The Orange Box
    base_url: https://theorangebox.ph
    is_mine: false
    brand_source: title
  - key: baghub
    name: The Bag Hub
    base_url: https://www.thebaghub.com
    is_mine: false
    brand_source: tags
  - key: shopwithk
    name: Shop with K
    base_url: https://shopwithk.ph
    is_mine: false
    brand_source: title
  - key: luxurywish
    name: Luxury Wish
    base_url: https://luxurywish.com.ph
    is_mine: false
    brand_source: vendor
  - key: aandjluxury
    name: A&J Luxury
    base_url: https://aandjluxury.com
    is_mine: false
    brand_source: vendor   # vendor field holds the real brand (tags empty)

scrape:
  page_limit: 250
  max_pages: 60
  delay_seconds: 1.5
  timeout_seconds: 30
  retries: 3
  user_agent: "MarketIntelBot/1.0 (+rbbincal@gmail.com; polite daily snapshot)"
  respect_robots: true
  image_hash: true          # perceptual-hash first image of newly seen products
  image_hash_width: 128

sold_detection:
  missing_days_threshold: 3   # gone this many consecutive runs => sold

aging_thresholds: [60, 90]

hero_models:
  - name: Birkin 25
    brand: Hermes
    keywords: ['birkin\s*25\b', '\bb25\b', 'birkin25']
  - name: Birkin 30
    brand: Hermes
    keywords: ['birkin\s*30\b', '\bb30\b', 'birkin30']
  - name: Kelly 25
    brand: Hermes
    keywords: ['kelly\s*25\b', '\bk25\b', 'kelly25']
  - name: Kelly 28
    brand: Hermes
    keywords: ['kelly\s*28\b', '\bk28\b', 'kelly28']
  - name: Mini Kelly (Kelly 20)
    brand: Hermes
    keywords: ['mini\s*kelly', 'kelly\s*20\b', '\bk20\b', 'kelly\s*ii', 'kelly20']
  - name: Constance 18
    brand: Hermes
    keywords: ['constance\s*18\b', '\bc18\b', 'constance18', 'mini\s*constance']
  - name: Constance 24
    brand: Hermes
    keywords: ['constance\s*24\b', '\bc24\b', 'constance24']
  # Chanel "Classic Double Flap". Stores write the three words (classic / double /
  # flap) and the size in EVERY possible order, e.g.:
  #   "Classic Double Flap Medium ..."        (Purse Maison)
  #   "Medium Double Flap ..."                (Orange Box)
  #   "... Medium Classic Double Flap Bag"    (The Bag Hub)
  #   "Chanel Classic Medium Flap ..."        (Shop with K — size BETWEEN classic & flap)
  #   "Chanel Classic Small Flap ..."         (Shop with K)
  #   "Chanel Classic Jumbo Flap ..."         (Shop with K)
  # Adjacency-based regexes can't catch all of these, so each size uses
  # presence lookaheads: the title must contain "flap" AND ("classic" OR
  # "double") AND the size word, in any arrangement. This excludes non-classic
  # flaps that lack both "classic" and "double" — "Easy Flap", "Mini/Rectangular
  # Flap", "Reissue", "Pearl Handle ... Flap".
  - name: Chanel Double Flap Small
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\bsmall\b)']
  - name: Chanel Double Flap Medium
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\b(?:medium|m l)\b)']
  - name: Chanel Double Flap Jumbo
    brand: Chanel
    keywords: ['(?=.*flap)(?=.*(?:classic|double))(?=.*\bjumbo\b)', '\bjumbo\b']

name: Daily market scrape

on:
  schedule:
    # Every 6 hours, at :23 (off-peak minute — GitHub drops top-of-hour crons under load).
    # = 4 runs/day at UTC 00/06/12/18:23 (Manila 08/14/20/02:23).
    # Sold-detection is calendar-day based, so run frequency does NOT change the
    # 3-day "missing => sold" rule; extra same-day runs are idempotent.
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape (with retries)
        run: |
          for i in 1 2 3; do
            python scraper/scrape.py && break
            echo "Attempt $i failed; retrying in 60s…"
            [ $i -eq 3 ] && exit 1
            sleep 60
          done

      - name: Analyze + build dashboard data
        run: python scraper/analyze.py

      - name: Excel export
        run: python scraper/export_excel.py

      - name: Prune old exports (keep 30 days)
        run: ls -1t exports/*.xlsx 2>/dev/null | tail -n +31 | xargs -r rm --

      # Daily off-site backup of the database to Google Drive. No-ops until the
      # GDRIVE_SA_JSON (and GDRIVE_FOLDER_ID) repo secrets are configured, so it
      # never breaks a run. Writes one dated copy per day + a rolling "latest".
      - name: Backup database to Google Drive
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          if [ -z "$GDRIVE_SA_JSON" ] || [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "Google Drive secrets not set — skipping backup (see README to enable)."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq rclone
          printf '%s' "$GDRIVE_SA_JSON" > /tmp/gdrive-sa.json
          export RCLONE_CONFIG_GD_TYPE=drive
          export RCLONE_CONFIG_GD_SCOPE=drive
          export RCLONE_CONFIG_GD_SERVICE_ACCOUNT_FILE=/tmp/gdrive-sa.json
          export RCLONE_CONFIG_GD_ROOT_FOLDER_ID="$GDRIVE_FOLDER_ID"
          STAMP=$(TZ=Asia/Manila date +%F)
          rclone copyto data/market.db "gd:market-$STAMP.db" --no-traverse
          rclone copyto data/market.db "gd:market-latest.db" --no-traverse
          rm -f /tmp/gdrive-sa.json
          echo "Backed up market.db to Google Drive (market-$STAMP.db + market-latest.db)."

      - name: Commit DB + exports
        run: |
          git config user.name "bag-intel-bot"
          git config user.email "actions@github.com"
          git add data/market.db exports site/data.json
          # Nothing to commit (e.g. all sites unchanged) => succeed quietly
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          MSG="Daily snapshot $(TZ=Asia/Manila date +%F)"
          git commit -m "$MSG"
          # A push can be rejected if main advanced meanwhile (a config edit, or a
          # re-run of an older run). The generated files (DB / exports / data.json)
          # are a complete fresh snapshot, so on rejection we DON'T rebase (binary
          # files can't auto-merge and leave the repo stuck). Instead we move our
          # branch tip onto the latest main and re-commit THIS run's files on top —
          # no merge conflicts, newest scrape always wins, other commits preserved.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            echo "Push rejected (attempt $i) — re-basing snapshot onto latest main…"
            git fetch origin main
            git reset --soft origin/main
            git add data/market.db exports site/data.json
            git diff --cached --quiet && { echo "Already current after sync"; exit 0; }
            git commit -m "$MSG"
            sleep $(( (RANDOM % 5) + 2 ))
          done
          echo "::error::Could not push snapshot after 5 attempts" >&2
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Backup DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-db-${{ github.run_id }}
          path: data/market.db
          retention-days: 30

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [scrape, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Scrape failed — ${new Date().toISOString().slice(0,10)}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'scrape-failure' });
            const body = `The daily scrape/deploy failed. ` +
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['scrape-failure'] });
            }

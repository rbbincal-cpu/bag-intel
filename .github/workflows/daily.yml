name: Daily market scrape

on:
  schedule:
    # Every 3 hours, at :23 (off-peak minute — GitHub drops top-of-hour crons under load).
    # = 8 runs/day at UTC 00/03/06/09/12/15/18/21:23 (Manila 08/11/14/17/20/23/02/05:23).
    # Sold-detection is calendar-day based, so a higher run frequency does NOT change the
    # 3-day "missing => sold" rule; extra same-day runs are idempotent.
    - cron: "23 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape (with retries)
        run: |
          for i in 1 2 3; do
            python scraper/scrape.py && break
            echo "Attempt $i failed; retrying in 60s…"
            [ $i -eq 3 ] && exit 1
            sleep 60
          done

      - name: Analyze + build dashboard data
        run: python scraper/analyze.py

      - name: Excel export
        run: python scraper/export_excel.py

      - name: Prune old exports (keep 30 days)
        run: ls -1t exports/*.xlsx 2>/dev/null | tail -n +31 | xargs -r rm --

      - name: Commit DB + exports
        run: |
          git config user.name "bag-intel-bot"
          git config user.email "actions@github.com"
          git add data/market.db exports site/data.json
          # Nothing to commit (e.g. all sites unchanged) => succeed quietly
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily snapshot $(TZ=Asia/Manila date +%F)"
          # Push can be rejected if another commit (a config edit, or an overlapping
          # run) landed on main meanwhile. Rebase onto the latest main and retry
          # instead of failing the whole run. The snapshot only touches data/exports,
          # so a rebase over unrelated commits applies cleanly.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $i) — rebasing onto origin/main and retrying…"
            git pull --rebase --autostash origin main || true
            sleep $(( (RANDOM % 5) + 2 ))
          done
          echo "::error::Could not push snapshot after 5 rebase/retry attempts" >&2
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Backup DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-db-${{ github.run_id }}
          path: data/market.db
          retention-days: 30

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [scrape, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Scrape failed — ${new Date().toISOString().slice(0,10)}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'scrape-failure' });
            const body = `The daily scrape/deploy failed. ` +
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['scrape-failure'] });
            }
